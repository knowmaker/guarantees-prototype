<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AFT — Подача заявки</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="logo"><span class="logo-badge">A</span> AFT</div>
      <nav class="main-nav">
        <a class="nav-item active" href="#">Подача заявки</a>
        <a class="nav-item" href="#">Скоринг</a>
        <a class="nav-item" href="#">Решение</a>
      </nav>
    </aside>

    <main class="main">
      <div class="topbar">ООО «Ромашка»</div>
      <div class="page page-wide">
        <h1>AFT</h1>

        <section id="aftResultCard" class="section card aft-result-card is-hidden" aria-live="polite">
          <div class="aft-result-head">
            <h3 id="aftResultTitle">Проверка заявки</h3>
          </div>
          <p id="aftResultText" class="muted mb-0">Выполняем скоринг. Пожалуйста, подождите.</p>
          <div class="filter-row mt-16">
            <a id="aftResultAction" class="btn btn-red is-hidden" href="07-dokumenty-podpis.html">Перейти к подписанию</a>
          </div>
        </section>

        <section class="section form-shell">
          <h3>Подача заявки на банковскую гарантию</h3>

          <article class="form-section">
            <h4>Данные заявки</h4>
            <div class="field-grid two">
              <div class="field">
                <label>Номер заявки</label>
                <input value="AFT-2026-0412" readonly />
              </div>
              <div class="field">
                <label>Вид гарантии</label>
                <input value="Гарантия исполнения контракта" readonly />
              </div>
            </div>
            <div class="field-grid two mt-12">
              <div class="field">
                <label>Сумма, ₽</label>
                <input value="85 000 000,00" readonly />
              </div>
              <div class="field">
                <label>Срок действия</label>
                <input value="365 дней" readonly />
              </div>
            </div>
            <div class="field-grid one mt-12">
              <div class="field">
                <label>Принципал</label>
                <input value="ООО «Ромашка», ИНН 7702000002" readonly />
              </div>
            </div>
          </article>

          <div class="filter-row mt-16">
            <button id="aftSubmit" class="btn btn-red" type="button">Подать заявку</button>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script>
    (function () {
      const submitBtn = document.getElementById('aftSubmit');
      const resultCard = document.getElementById('aftResultCard');
      const resultTitle = document.getElementById('aftResultTitle');
      const resultText = document.getElementById('aftResultText');
      const resultAction = document.getElementById('aftResultAction');

      submitBtn.addEventListener('click', function () {
        submitBtn.disabled = true;
        submitBtn.textContent = 'Заявка отправлена';
        resultCard.classList.remove('is-hidden');
        resultCard.classList.remove('aft-result-warn', 'aft-result-success');
        resultTitle.textContent = 'Проверка заявки';
        resultText.textContent = 'Выполняем скоринг. Пожалуйста, подождите.';
        resultAction.classList.add('is-hidden');

        window.setTimeout(function () {
          resultCard.classList.add('aft-result-warn');
          resultTitle.textContent = 'Нам нужно больше времени, чтобы проверить вашу заявку';
          resultText.textContent = 'Вернемся с результатом в течение 6 часов.';
        }, 1800);

        window.setTimeout(function () {
          resultCard.classList.remove('aft-result-warn');
          resultCard.classList.add('aft-result-success');
          resultTitle.textContent = 'Одобрено в Альфа-Бизнес';
          resultText.textContent = 'Одобрена банковская гарантия №BG-2026-0412 на сумму 85 000 000,00 ₽.';
          resultAction.classList.remove('is-hidden');
        }, 5200);
      });
    })();
  </script>
</body>
</html>
